<!DOCTYPE html>
<html lang="es" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Planti Dashboard - Interactivo</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@4.7.2/dist/full.min.css" rel="stylesheet" type="text/css" />
    <script src="https://cdn.tailwindcss.com"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: { sans: ['Inter', 'sans-serif'] },
                    colors: {
                        brand: {
                            light: '#e1f5e5',
                            DEFAULT: '#4ade80',
                            dark: '#6FA83A',
                            leaf: '#0f2e1a'
                        },
                        surface: '#f8fafc'
                    }
                }
            }
        }
    </script>
    <style>
        [x-cloak] { display: none !important; }
        .sidebar-transition { transition: width 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="bg-surface text-gray-800 font-sans" x-data="{ sidebarOpen: true, activeTab: 'orders' }">

    <div class="flex h-screen overflow-hidden">
        
        <aside 
            class="bg-white border-r border-gray-100 flex flex-col justify-between relative z-20 sidebar-transition"
            :class="sidebarOpen ? 'w-64' : 'w-20'">
            
            <button 
                @click="sidebarOpen = !sidebarOpen"
                class="absolute -right-3 top-20 bg-white border border-gray-100 rounded-full p-1 shadow-md hover:text-brand-dark transition-all z-30">
                <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 transition-transform" :class="!sidebarOpen && 'rotate-180'" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" />
                </svg>
            </button>

            <div>
                <div class="p-6 flex items-center gap-3 overflow-hidden">
                    <div class="bg-brand text-white rounded-xl p-2 shadow-sm shrink-0">
                        <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.5 22.5c-4.14 0-7.5-3.36-7.5-7.5v-3H7c-1.1 0-2-.9-2-2V7c0-2.76 2.24-5 5-5h3c2.76 0 5 2.24 5 5v3h3c1.1 0 2 .9 2 2v3c0 4.14-3.36 7.5-7.5 7.5zm-5.5-10.5c0 3.03 2.47 5.5 5.5 5.5s5.5-2.47 5.5-5.5v-1h-11v1zm3-7V4h-5c-1.65 0-3 1.35-3 3v1h8V5z"/></svg>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-gray-900 whitespace-nowrap transition-opacity duration-200"
                          :class="sidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'">Planti.</span>
                </div>

                <nav class="mt-4 flex flex-col gap-1">
                    <a href="#" 
                       @click.prevent="activeTab = 'dashboard'"
                       class="flex items-center gap-3 px-6 py-3 transition-all duration-200 border-l-4"
                       :class="activeTab === 'dashboard' ? 'text-brand-dark bg-green-50/50 border-brand-dark' : 'text-gray-400 border-transparent hover:bg-gray-50 hover:text-gray-600'">
                        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2V6zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zm10 0a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path></svg>
                        <span class="text-sm font-semibold whitespace-nowrap" x-show="sidebarOpen" x-transition>Dashboard</span>
                    </a>

                    <a href="#" 
                       @click.prevent="activeTab = 'orders'"
                       class="flex items-center gap-3 px-6 py-3 transition-all duration-200 border-l-4"
                       :class="activeTab === 'orders' ? 'text-brand-dark bg-green-50/50 border-brand-dark' : 'text-gray-400 border-transparent hover:bg-gray-50 hover:text-gray-600'">
                        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4m0-10L4 7m8 4v10M4 7v10l8 4"></path></svg>
                        <span class="text-sm font-semibold whitespace-nowrap" x-show="sidebarOpen" x-transition>My Orders</span>
                    </a>

                    <a href="#" 
                       @click.prevent="activeTab = 'explore'"
                       class="flex items-center gap-3 px-6 py-3 transition-all duration-200 border-l-4"
                       :class="activeTab === 'explore' ? 'text-brand-dark bg-green-50/50 border-brand-dark' : 'text-gray-400 border-transparent hover:bg-gray-50 hover:text-gray-600'">
                        <svg class="w-6 h-6 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <span class="text-sm font-semibold whitespace-nowrap" x-show="sidebarOpen" x-transition>Explore</span>
                    </a>
                </nav>

                <div class="mt-8 overflow-hidden">
                    <p class="px-6 text-[10px] font-bold text-gray-400 uppercase tracking-widest mb-2 whitespace-nowrap" x-show="sidebarOpen" x-transition>Settings</p>
                    <nav class="flex flex-col gap-1">
                        <template x-for="item in ['Settings', 'Charts', 'Contact']">
                            <a href="#" 
                               @click.prevent="activeTab = item.toLowerCase()"
                               class="flex items-center gap-3 px-6 py-2 transition-all duration-200 border-l-4"
                               :class="activeTab === item.toLowerCase() ? 'text-brand-dark bg-green-50/50 border-brand-dark' : 'text-gray-400 border-transparent hover:bg-gray-50 hover:text-gray-600'">
                                <div class="w-6 h-6 flex items-center justify-center">
                                    <div class="w-1.5 h-1.5 rounded-full bg-current"></div>
                                </div>
                                <span class="text-xs font-medium whitespace-nowrap" x-show="sidebarOpen" x-transition x-text="item"></span>
                            </a>
                        </template>
                    </nav>
                </div>
            </div>

            <div class="p-4 transition-opacity duration-200" :class="sidebarOpen ? 'opacity-100' : 'opacity-0 pointer-events-none'">
                <div class="bg-gradient-to-b from-brand-light to-brand/10 rounded-2xl p-4 text-center">
                    <h4 class="font-bold text-gray-800 text-xs">Help Center</h4>
                    <button class="btn btn-xs w-full bg-white text-gray-800 border-none hover:bg-gray-50 rounded-lg shadow-sm mt-3 text-[10px]">Go To Center</button>
                </div>
            </div>
        </aside>

        <main class="flex-1 overflow-y-auto bg-surface">
            <header class="p-8 flex justify-between items-center bg-white/50 backdrop-blur-md sticky top-0 z-10">
                <div class="flex items-center gap-4">
                    <button class="md:hidden btn btn-ghost btn-sm">
                        <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16m-7 6h7"></path></svg>
                    </button>
                    <div>
                        <h1 class="text-2xl font-bold text-gray-900">Welcome to Planti.</h1>
                        <p class="text-xs text-gray-400">Manage your garden and orders effortlessly.</p>
                    </div>
                </div>

                <div class="flex items-center gap-4">
                    <div class="hidden sm:flex items-center bg-white rounded-full px-4 py-2 border border-gray-100 shadow-sm">
                        <svg class="w-4 h-4 text-gray-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
                        <input type="text" placeholder="Search..." class="bg-transparent border-none text-xs ml-2 focus:ring-0 w-32">
                    </div>
                    <div class="avatar online">
                        <div class="w-8 rounded-full ring ring-brand ring-offset-base-100 ring-offset-2">
                            <img src="https://i.pravatar.cc/150?u=shakir" />
                        </div>
                    </div>
                </div>
            </header>

            <div class="p-8">
                <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                    <div class="lg:col-span-2 h-48 bg-brand-leaf rounded-3xl p-8 text-white relative overflow-hidden">
                        <h2 class="text-2xl font-bold relative z-10">New Arrivals</h2>
                        <p class="text-sm text-brand-light relative z-10 mt-2">Check out our latest exotic species.</p>
                        <button class="btn btn-sm bg-brand border-none text-brand-leaf mt-4 relative z-10">Shop Now</button>
                        <svg class="absolute right-0 bottom-0 w-48 h-48 text-brand/10 -mr-10 -mb-10" fill="currentColor" viewBox="0 0 24 24"><path d="M17 22H7a5 5 0 01-5-5V7a5 5 0 015-5h10a5 5 0 015 5v10a5 5 0 01-5 5z"/></svg>
                    </div>
                    <div class="bg-brand-light rounded-3xl p-6">
                        <h3 class="font-bold text-gray-800">Sales Summary</h3>
                        <div class="mt-4 flex items-end justify-between">
                            <span class="text-3xl font-black text-brand-dark">173</span>
                            <span class="text-xs font-bold text-gray-500 mb-1">Orders this month</span>
                        </div>
                    </div>
                </div>
                
                <div class="mt-8 bg-white border border-gray-100 rounded-3xl p-12 text-center border-dashed">
                    <p class="text-gray-400 font-medium">Contenido de la pestaña: <span class="uppercase font-bold text-brand-dark" x-text="activeTab"></span></p>
                </div>
            </div>
        </main>
    </div>

</body>
</html>
